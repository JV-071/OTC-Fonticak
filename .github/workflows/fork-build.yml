## Workflow do fork (JV-071): builda SÓ o Windows CMake Release.
## O ci.yml do upstream dispara 13 jobs (Linux x2, Windows x4, macOS, Android,
## Docker, Browser) — aqui só precisamos do artefato windows-cmake-release.
## Cache: vcpkg binário via NuGet (GitHub Packages, secret VCPKG_PACKAGES_TOKEN)
## + sccache para os objetos. Com cache quente o build fica na casa de minutos.
name: Fork Build (Windows CMake Release)

on:
  workflow_dispatch:
  push:
    branches: ["**"]
    paths:
      - "src/**"
      - "cmake/**"
      - "vcpkg.json"
      - "CMakeLists.txt"
      - "CMakePresets.json"
      - ".github/workflows/fork-build.yml"

concurrency:
  group: fork-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Compile (CMake Release)
    runs-on: windows-2025
    env:
      VCPKG_BINARY_SOURCES: "clear;nuget,https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json,${{ secrets.VCPKG_PACKAGES_TOKEN != '' && 'readwrite' || 'read' }};nugettimeout,600"
      VCPKG_NUGET_REPOSITORY: https://github.com/${{ github.repository }}.git
      VCPKG_NUGET_API_KEY: ${{ secrets.VCPKG_PACKAGES_TOKEN != '' && secrets.VCPKG_PACKAGES_TOKEN || github.token }}
      SCCACHE_DIR: ${{ github.workspace }}\.sccache
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Export GitHub Actions cache environment variables
        uses: actions/github-script@v9
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Get vcpkg baseline
        shell: pwsh
        run: |
          $json = Get-Content vcpkg.json -Raw | ConvertFrom-Json
          "VCPKG_GIT_COMMIT_ID=$($json.'builtin-baseline')" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Remove Windows pre-installed MySQL
        shell: pwsh
        run: Remove-Item -Recurse -Force C:\mysql* -ErrorAction SilentlyContinue

      - name: Prepare sccache directory
        shell: pwsh
        run: New-Item -ItemType Directory -Force -Path $env:SCCACHE_DIR | Out-Null

      - name: CCache
        uses: hendrikmuhs/ccache-action@v1.2.23
        with:
          max-size: "1G"
          variant: "sccache"
          key: ccache-windows-release
          restore-keys: |
            ccache-windows

      - name: Setup NuGet source for GitHub Packages
        shell: pwsh
        env:
          NUGET_AUTH_TOKEN: ${{ env.VCPKG_NUGET_API_KEY }}
        run: |
          $feed = "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"
          $nuget = (Get-Command nuget.exe -ErrorAction SilentlyContinue).Source
          if (-not $nuget) { throw "nuget.exe not found in PATH" }
          & $nuget sources remove -Name "GitHubPackages" 2>&1 | Out-Null
          & $nuget sources add -Name "GitHubPackages" -Source $feed `
            -UserName "${{ github.repository_owner }}" -Password "$env:NUGET_AUTH_TOKEN" `
            -StorePasswordInClearText
          & $nuget setapikey "$env:NUGET_AUTH_TOKEN" -Source $feed

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitURL: "https://github.com/microsoft/vcpkg.git"
          vcpkgGitCommitId: ${{ env.VCPKG_GIT_COMMIT_ID }}

      - name: Run CMake
        uses: lukka/run-cmake@v10
        with:
          configurePreset: windows-release
          buildPreset: windows-release
          configurePresetAdditionalArgs: "['-DTOGGLE_BIN_FOLDER=ON', '-DOPTIONS_ENABLE_IPO=OFF', '-DOTCLIENT_BUILD_TESTS=OFF']"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: windows-cmake-release
          path: build/windows-release/bin/
