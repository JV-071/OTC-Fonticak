# Workflow descartável: backtrace do segfault nos testes TileSpectators.
# Disparar com: gh workflow run debug-tilespectators.yml --ref debug/tilespectators-gdb
# Remover depois que o bug for corrigido.
name: Debug TileSpectators (gdb)

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  gdb:
    runs-on: ubuntu-24.04
    env:
      CC: gcc-14
      CXX: g++-14
      VCPKG_BINARY_SOURCES: "clear;nuget,https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json,read;nugettimeout,600"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Get vcpkg baseline
        shell: bash
        run: |
          set -euo pipefail
          vcpkg_commit_id="$(grep '.builtin-baseline' vcpkg.json | awk -F: '{print $2}' | tr -d '," ')"
          echo "VCPKG_GIT_COMMIT_ID=${vcpkg_commit_id}" >> "${GITHUB_ENV}"

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf autoconf-archive automake ccache gcc-14 g++-14 gdb \
            libgl1-mesa-dev libglu1-mesa-dev libltdl-dev libtool libtool-bin \
            libx11-dev libxcursor-dev libxi-dev libxinerama-dev libxrandr-dev \
            linux-libc-dev make mono-complete ninja-build perl pkg-config
          sudo ln -sf /usr/bin/ninja /usr/bin/ninja-build

      - name: CCache
        uses: hendrikmuhs/ccache-action@v1.2.23
        with:
          max-size: "1G"
          key: ccache-linux-linux-debug
          restore-keys: |
            ccache-linux

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitURL: "https://github.com/microsoft/vcpkg.git"
          vcpkgGitCommitId: ${{ env.VCPKG_GIT_COMMIT_ID }}

      - name: Setup NuGet for vcpkg
        env:
          NUGET_AUTH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          unset VCPKG_FORCE_SYSTEM_BINARIES
          nuget_path="$(vcpkg fetch nuget 2>&1 | grep -E '^/' | tail -n 1)"
          if [[ -z "${nuget_path}" || ! -f "${nuget_path}" ]]; then
            echo "Failed to locate NuGet fetched by vcpkg."
            exit 1
          fi
          mono "${nuget_path}" sources add \
            -source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
            -storepasswordincleartext \
            -name "GitHubPackages" \
            -username "${{ github.repository_owner }}" \
            -password "${NUGET_AUTH_TOKEN}"

      - name: Configure
        uses: lukka/run-cmake@v10
        with:
          configurePreset: linux-debug
          configurePresetAdditionalArgs: "['-DTOGGLE_BIN_FOLDER=ON', '-DOPTIONS_ENABLE_IPO=OFF']"

      - name: Build test target
        run: cmake --build build/linux-debug --target otclient_map_spectator_tests -j2

      - name: Run failing tests under gdb
        run: |
          set -uo pipefail
          bin="$(find build/linux-debug -type f -name otclient_map_spectator_tests | head -n1)"
          echo "binário: ${bin}"
          for t in TileSpectators.CreatureRangeTracksMixedInsertions TileSpectators.RemovingCreaturesUpdatesSpan; do
            echo "::group::gdb ${t}"
            gdb -batch \
              -ex run \
              -ex bt \
              -ex 'info locals' \
              --args "${bin}" --gtest_filter="${t}" || true
            echo "::endgroup::"
          done
